name: Tests E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.3 (pdo_sqlite)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances de test
        run: npm ci

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps chromium

      - name: Lancer la suite de tests
        run: npm test

      - name: Publier le rapport Playwright en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
